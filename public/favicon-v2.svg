<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="25%" height="25%">
    <defs>
        <pattern id="bg-stripes" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
            <rect width="20" height="40" fill="#141414"/>
            <rect x="20" width="20" height="40" fill="#0a0a0a"/>
        </pattern>

        <pattern id="halftone" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
            <circle cx="2" cy="2" r="2" fill="#000000" opacity="0.55"/>
        </pattern>

        <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF0022"/>
            <stop offset="100%" stop-color="#B3000C"/>
        </linearGradient>

        <polygon id="splat" points="
            256,20 310,110 440,30 380,150 500,190 
            390,250 480,370 360,340 410,490 290,410 
            230,500 210,400 70,480 160,340 20,290 
            150,240 30,110 180,160 140,20 220,120
        "/>

        <polygon id="paper-red" points="180,110 380,90 400,410 200,430"/>
        <polygon id="paper-l" points="240,150 430,130 450,370 260,390"/>
        <polygon id="paper-j" points="100,170 270,140 290,380 120,400"/>

        <path id="letter-j" d="M 130 190 L 250 170 L 255 220 L 225 225 L 225 355 L 190 350 L 110 330 L 140 290 L 180 310 L 180 230 L 125 235 Z"/>
        <path id="letter-l" d="M 280 170 L 330 160 L 315 310 L 400 295 L 410 345 L 270 370 Z"/>

        <g id="p5-star">
            <path d="M 0 -20 L 4 -4 L 20 0 L 4 4 L 0 20 L -4 4 L -20 0 L -4 -4 Z"/>
        </g>
    </defs>

    <rect width="512" height="512" fill="url(#bg-stripes)"/>

    <g id="splat-group">
        <use href="#splat" fill="#000000" transform="translate(12, 12)"/>
        <use href="#splat" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="24" stroke-linejoin="miter" stroke-miterlimit="10"/>
        <use href="#splat" fill="url(#redGrad)" stroke="#000000" stroke-width="8" stroke-linejoin="miter" stroke-miterlimit="10"/>
        <use href="#splat" fill="url(#halftone)"/>
    </g>

    <g id="background-shards">
        <polygon points="50,50 80,40 60,90" fill="#E60012"/>
        <polygon points="450,80 490,70 460,110" fill="#FFFFFF"/>
        <polygon points="80,420 120,440 70,460" fill="#FFFFFF"/>
        <polygon points="380,450 420,430 400,480" fill="#E60012"/>
        <polygon points="250,40 270,20 280,60" fill="#000000"/>
    </g>

    <g id="paper-accents">
        <polygon points="90,180 130,170 135,190 95,200" fill="#E60012"/>
        <polygon points="390,140 440,130 445,150 395,160" fill="#FFFFFF"/>
        <polygon points="360,80 420,100 410,120 350,100" fill="#000000"/>
        
        <polygon points="130,360 180,350 175,370 125,380" fill="#E60012"/>
        <polygon points="360,170 410,160 415,180 365,190" fill="#E60012"/>
        <polygon points="370,195 400,190 405,205 375,210" fill="#333333"/>
    </g>

    <g id="letters">
        <use href="#letter-j" fill="#000000" transform="translate(24, 24)"/>
        <use href="#letter-j" fill="#E60012" transform="translate(12, 12)"/>
        <use href="#letter-j" fill="#FFFFFF"/>

        <use href="#letter-l" fill="#000000" transform="translate(24, 24)"/>
        <use href="#letter-l" fill="#E60012" transform="translate(12, 12)"/>
        <use href="#letter-l" fill="#FFFFFF"/>
    </g>

    <g id="foreground-stars">
        <use href="#p5-star" transform="translate(100, 100) scale(1.5) rotate(15)" fill="#FFFFFF"/>
        <use href="#p5-star" transform="translate(420, 80) scale(1.2) rotate(-10)" fill="#E60012"/>
        <use href="#p5-star" transform="translate(80, 400) scale(2) rotate(25)" fill="#E60012"/>
        <use href="#p5-star" transform="translate(450, 420) scale(1.8) rotate(-20)" fill="#FFFFFF"/>
        <use href="#p5-star" transform="translate(256, 60) scale(1) rotate(45)" fill="#000000"/>
        <use href="#p5-star" transform="translate(256, 460) scale(1.3) rotate(10)" fill="#000000"/>
    </g>
</svg>