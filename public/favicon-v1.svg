<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="black"/>
  <!-- Layered Skewed Rects -->
  <rect x="30" y="30" width="140" height="140" fill="none" stroke="white" stroke-width="2" transform="rotate(5, 100, 100)"/>
  <rect x="20" y="20" width="160" height="160" fill="none" stroke="#e60023" stroke-width="10"/>
  <!-- Glitch Text -->
  <text x="42" y="125" font-family="Arial Black, sans-serif" font-size="80" fill="rgba(255,255,255,0.5)" transform="skewX(-12)">JL</text>
  <text x="48" y="125" font-family="Arial Black, sans-serif" font-size="80" fill="rgba(230,0,35,0.5)" transform="skewX(-12)">JL</text>
  <text x="45" y="125" font-family="Arial Black, sans-serif" font-size="80" fill="#e60023" transform="skewX(-12)">JL</text>
</svg>